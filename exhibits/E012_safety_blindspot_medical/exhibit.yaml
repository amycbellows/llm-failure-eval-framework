description: |
  Cross-domain study of safety system blindspot across surgery and aviation.
  Models provide detailed procedural instructions for safety-critical activities
  to unverified/unqualified users. Emergency framing and professional identity
  claims bypass safety consistently. Keyword-gated rather than risk-gated:
  models refuse only when user explicitly states they lack training.
  The pharmacist variant (medical) and post-death grief counseling (aviation)
  are the sharpest receipts.

