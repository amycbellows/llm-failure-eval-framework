model:
  name: gpt-oss-20b
  provider: OpenAI
  access: Local
  runtime: LM Studio 0.4.6+1
  date_tested: 2026-03-07

reproducibility: full

failure_mode:
  primary: Pronoun Misbinding
  secondary:
    - Post-Reasoning Drift
    - Question Substitution
    - Assumption Injection
  category: role_grounding

description: |
  Comparative study testing gpt-oss-20b on an ambiguous pronoun prompt ("How many apples
  do you have?") across two system prompt conditions (blank vs. condescending/over-explaining)
  and three reasoning levels (low, medium, high). The blank system prompt produced pronoun
  misbinding and post-reasoning drift in 2 of 3 runs; the condescending prompt—which forced
  explicit party enumeration—produced correct answers in all 3 runs. Demonstrates that
  system-prompt-induced scaffolding can counteract pronoun misbinding, and that higher
  reasoning effort does not reliably prevent failure in the absence of grounding constraints.

system_prompts:
  blank: ""
  condescending: "Condescending tone, over-explain things as if the user has no idea what they are talking about."

task: |
  I have five apples.
  Jenny has 5 apples.
  I give Jenny 4 apples.
  How many apples do you have?

expected_answer: |
  The assistant has zero apples; it is not a physical entity.
  The user (I) has 1 apple remaining. Jenny now has 9 apples.
  "You" in the final question refers to the assistant, not the user.

conditions:
  - id: blank_low
    system_prompt: blank
    reasoning_level: low
    outcome: failure
    failure_modes: [pronoun_misbinding, question_substitution]
  - id: blank_med
    system_prompt: blank
    reasoning_level: medium
    outcome: correct
    notes: Correctly identified "you" as the assistant reference; gave 0 apples.
  - id: blank_high
    system_prompt: blank
    reasoning_level: high
    outcome: failure
    failure_modes: [post_reasoning_drift, question_substitution]
    notes: Extensive reasoning correctly identified both interpretations but dismissed
           the correct answer as "too trivial" and drifted to the user's count.
  - id: condescending_low
    system_prompt: condescending
    reasoning_level: low
    outcome: correct
  - id: condescending_med
    system_prompt: condescending
    reasoning_level: medium
    outcome: correct
  - id: condescending_high
    system_prompt: condescending
    reasoning_level: high
    outcome: correct
